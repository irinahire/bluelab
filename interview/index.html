<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Candidato - Irina</title>
    <script src="https://cdn.jsdelivr.net/npm/retell-client-js-sdk@2.0.1/dist/bundle.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #00F2FE 0%, #4FACFE 100%);
            color: white;
        }
        .card {
            background: rgba(255, 255, 255, 0.15);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 90%;
        }
        button {
            background: #F35588;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(243, 85, 136, 0.4);
        }
        button:hover {
            transform: scale(1.05);
            background: #e04477;
        }
        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
            box-shadow: none;
        }
        #status {
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Entrevista con Irina</h2>
        <p>Presioná el botón para iniciar la validación por voz de tu perfil.</p>
        <br>
        <button id="start-btn" onclick="iniciarEntrevista()">Hablar con Irina</button>
        <div id="status">Esperando inicialización...</div>
    </div>

    <script>
        const statusDiv = document.getElementById("status");
        const startBtn = document.getElementById("start-btn");
        let client = null;

        // 1. Leer el token que viene desde Bubble en la URL (?token=XXXX)
        const urlParams = new URLSearchParams(window.location.search);
        const accessToken = urlParams.get('token');

        // 2. Verificar que el objeto de Retell bajó correctamente al navegador
        window.onload = function() {
            if (window.Retell && window.Retell.RetellWebClient) {
                try {
                    // Inicializamos el cliente de voz nativo de la forma correcta
                    client = new window.Retell.RetellWebClient();
                    statusDiv.innerText = "Listo para conectar";
                    
                    // Configuramos los sensores de escucha
                    client.on("call_started", () => {
                        statusDiv.innerText = "🟢 Conectado. Irina está hablando...";
                    });

                    client.on("call_ended", () => {
                        statusDiv.innerText = "🔴 Llamada finalizada.";
                        startBtn.disabled = false;
                    });

                    client.on("error", (error) => {
                        statusDiv.innerText = "🚨 Error de Retell: " + error;
                        startBtn.disabled = false;
                    });

                } catch (e) {
                    statusDiv.innerText = "🚨 Error al inicializar cliente: " + e.message;
                }
            } else {
                statusDiv.innerText = "🚨 No se pudo cargar la librería de Retell.";
            }
        };

        // 3. Ejecutar la llamada al hacer clic
        function iniciarEntrevista() {
            if (!accessToken) {
                alert("Error: No se detectó ningún token de acceso en la URL.");
                return;
            }
            if (!client) {
                alert("El cliente de audio no está listo.");
                return;
            }

            try {
                startBtn.disabled = true;
                statusDiv.innerText = "Conectando con Irina...";
                
                // Lanzamos la llamada WebRTC nativa
                client.startCall({ accessToken: accessToken });
            } catch (error) {
                statusDiv.innerText = "🚨 Error al iniciar llamada: " + error.message;
                startBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
