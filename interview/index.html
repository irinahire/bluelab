<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Auditoría de Token - Irina (v4.0)</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 40px; background: #f4f6f9; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; max-width: 500px; width: 100%; word-wrap: break-word; }
        .token-box { background: #222; color: #00FF00; padding: 15px; border-radius: 5px; font-family: monospace; text-align: left; font-size: 14px; margin-top: 10px; overflow-x: auto; }
        button { background: #FF5555; color: white; border: none; padding: 12px 25px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Control de Seguridad - Versión 4.0</h2>
        <p>Esta versión solo analiza qué te está mandando Bubble para descubrir por qué Retell lo rechaza.</p>
        
        <div id="status" style="font-weight: bold; color: blue;">Analizando URL...</div>
        
        <h3 style="text-align: left; margin-top: 20px;">Token Detectado en Barra de Direcciones:</h3>
        <div id="token-display" class="token-box">Ninguno</div>
        
        <p style="text-align: left; font-size: 12px; color: #666; margin-top: 10px;">
            * Nota: Los tokens de Retell válidos suelen empezar con "key_" o un texto largo sin espacios.
        </p>

        <button onclick="volverAProbar()">Probar de nuevo</button>
    </div>

    <script>
        // Capturamos el texto exacto de la URL
        const parametros = new URLSearchParams(window.location.search);
        const tokenRecibido = parametros.get('token');
        
        const tokenDisplay = document.getElementById("token-display");
        const statusDiv = document.getElementById("status");

        window.onload = function() {
            if (tokenRecibido) {
                statusDiv.innerText = "⚠️ Token recibido. Analizá si es correcto abajo:";
                // Mostramos el token textualmente en pantalla
                tokenDisplay.innerText = tokenRecibido;
            } else {
                statusDiv.innerText = "🚨 ERROR: Bubble abrió esta página pero NO mandó ningún token en la URL.";
                tokenDisplay.innerText = "VACÍO (undefined)";
            }
        };

        function volverAProbar() {
            // Recarga la página para verificar si cambia algo
            window.location.reload();
        }
    </script>
</body>
</html>
