<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Entrevista - Irina</title>
    <script src="https://cdn.jsdelivr.net/npm/retell-client-js-sdk@2.0.1/dist/bundle.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #f4f6f9; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; }
        button { background: #00F2FE; color: black; border: none; padding: 15px 30px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        #status { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Entrevista con Irina</h2>
        <p>Presioná el botón para iniciar la conversación.</p>
        <button id="btn-hablar" onclick="conectarConIrina()">Iniciar llamada</button>
        <div id="status">Esperando señal...</div>
    </div>

    <script>
        // 1. Capturamos el token que viaja escondido en la URL de la página
        const parametros = new URLSearchParams(window.location.search);
        const tokenRecibido = parametros.get('token');

        const statusDiv = document.getElementById("status");

        // 2. Avisamos en pantalla si todo está listo para arrancar
        window.onload = function() {
            if (tokenRecibido) {
                statusDiv.innerText = "Conexión lista. Ya podés hablar con Irina.";
            } else {
                statusDiv.innerText = "⚠️ Error: No se detectó el token de acceso.";
            }
        };

        // 3. Cuando el usuario hace clic, se activa el micrófono directo
        function conectarConIrina() {
            try {
                statusDiv.innerText = "Conectando audio...";
                const client = new window.Retell.RetellWebClient();
                
                client.on("call_started", () => { statusDiv.innerText = "🟢 En línea: Irina te está escuchando..."; });
                client.on("call_ended", () => { statusDiv.innerText = "🔴 Llamada finalizada."; });
                client.on("error", (err) => { statusDiv.innerText = "🚨 Error: " + err; });

                client.startCall({ accessToken: tokenRecibido });
            } catch (error) {
                statusDiv.innerText = "🚨 Error de inicialización: " + error.message;
            }
        }
    </script>
</body>
</html>
