<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrevista - Irina (v7.0 Oficial)</title>
    <script src="https://unpkg.com/retell-client-js-sdk@latest/dist/bundle.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; padding: 50px; background: #0f172a; color: #f8fafc; }
        .card { background: #1e293b; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); display: inline-block; max-width: 450px; border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-top: 0; }
        button { background: #06b6d4; color: #0f172a; border: none; padding: 16px 32px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 15px; }
        button:hover { background: #22d3ee; }
        #status { margin-top: 25px; font-weight: bold; font-size: 14px; padding: 12px; border-radius: 6px; background: #0f172a; border: 1px solid #1e293b; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Entrevista con Irina</h2>
        <p>Hacé clic abajo para iniciar la validación por voz.</p>
        <button id="btn-accion" onclick="conectarConIrina()">Iniciar llamada de voz</button>
        <div id="status">Verificando datos de acceso...</div>
    </div>

    <script>
        const parametros = new URLSearchParams(window.location.search);
        const tokenRecibido = parametros.get('token');
        const statusDiv = document.getElementById("status");
        const btnAccion = document.getElementById("btn-accion");
        
        let clienteRetell = null;
        let estaLlamando = false;

        window.onload = function() {
            if (tokenRecibido && tokenRecibido.trim() !== "") {
                statusDiv.innerHTML = "🔑 <span style='color: #4ade80;'>Token detectado con éxito. Listo para conectar.</span>";
            } else {
                statusDiv.innerHTML = "🚨 <span style='color: #f87171;'>Error: Falta el token de acceso en la URL.</span>";
                btnAccion.disabled = true;
            }
        };

        function conectarConIrina() {
            if (!tokenRecibido) return;

            if (estaLlamando) {
                clgEnd();
                return;
            }

            try {
                statusDiv.innerText = "Iniciando componentes de audio...";

                // Buscamos el constructor correcto dentro del paquete global de unpkg
                const RetellClient = window.RetellWebClient || window.Retell?.RetellWebClient;
                
                if (!RetellClient) {
                    statusDiv.innerHTML = "🚨 <span style='color: #f87171;'>Error interno: No se pudo mapear el SDK de voz.</span>";
                    return;
                }

                // Creamos la instancia oficial
                clienteRetell = new RetellClient();

                // Configuramos los disparadores de estado oficiales de Retell
                clienteRetell.on("call_started", () => {
                    estaLlamando = true;
                    btnAccion.innerText = "Finalizar llamada";
                    btnAccion.style.background = "#ef4444";
                    btnAccion.style.color = "#ffffff";
                    statusDiv.innerHTML = "🟢 <span style='color: #4ade80;'>¡En línea! Irina te está escuchando.</span>";
                });

                clienteRetell.on("call_ended", () => {
                    clgEnd();
                });

                clienteRetell.on("error", (err) => {
                    statusDiv.innerHTML = "🚨 <span style='color: #f87171;'>Error de llamada: " + (err.message || "Conexión rechazada") + "</span>";
                    clgEnd();
                });

                // Lanzamos la llamada usando el método nativo del SDK
                statusDiv.innerText = "Conectando micrófono con Irina...";
                clienteRetell.startCall({ accessToken: tokenRecibido });

            } catch (error) {
                statusDiv.innerHTML = "🚨 <span style='color: #f87171;'>Fallo crítico: " + error.message + "</span>";
                clgEnd();
            }
        }

        function clgEnd() {
            estaLlamando = false;
            btnAccion.innerText = "Iniciar llamada de voz";
            btnAccion.style.background = "#06b6d4";
            btnAccion.style.color = "#0f172a";
            statusDiv.innerHTML = "Llamada terminada.";
            if (clienteRetell) {
                try { clienteRetell.stopCall(); } catch(e){}
                clienteRetell = null;
            }
        }
    </script>
</body>
</html>
