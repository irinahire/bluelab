<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueLab | Blueprint Integrations Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Alkatra:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-irina: #bc8abf;
            --mint-irina: #96e8da;
            --bg-outer: #f0f2f5;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-outer);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .report-frame {
            background: white;
            width: 95%;
            max-width: 1200px;
            margin: 20px 0;
            padding: 4px; 
            border-radius: 20px;
            background: linear-gradient(135deg, var(--pink-irina), var(--mint-irina));
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
        }

        .report-content {
            background: white;
            border-radius: 17px;
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Volvemos a la cabecera original con banda de color completa */
        header {
            background: linear-gradient(to right, var(--pink-irina), var(--mint-irina));
            padding: 50px 60px;
            border-radius: 16px 16px 0 0;
            color: white;
        }

        .brand h1 {
            font-family: 'Alkatra', cursive;
            font-size: 4rem; /* BlueLab bien grande */
            margin: 0;
            line-height: 0.9;
        }

        .brand span {
            font-size: 1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 600;
            opacity: 0.9;
            display: block;
            margin-top: 5px;
        }

        .project-grid {
            padding: 60px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            justify-content: center;
        }

        /* NAIPE ESTILIZADO */
        .card {
            aspect-ratio: 2 / 3.4;
            border-radius: 25px;
            padding: 25px;
            color: white;
            display: flex;
            flex-direction: column;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            position: relative;
        }

        .card:hover {
            transform: translateY(-15px);
        }

        /* Espacio para la imagen */
        .card-image-placeholder {
            width: 100%;
            height: 55%;
            background: rgba(255,255,255,0.2);
            border-radius: 18px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .card-image-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card h2 {
            margin: 0 0 10px 0;
            font-size: 1.8rem;
            font-family: 'Alkatra', cursive;
        }

        .card p {
            font-size: 0.9rem;
            line-height: 1.5;
            opacity: 0.95;
            flex-grow: 1;
        }

        .card-btn {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="report-frame">
        <div class="report-content">
            
            <header>
                <div class="brand">
                    <h1>BlueLab</h1>
                    <span>Blueprint Integrations Lab</span>
                </div>
            </header>

            <div class="project-grid">
                <!-- NAIPE IRINA HIRE SELECTION -->
                <div class="card" style="background: linear-gradient(-45deg, #bc8abf, #96e8da);">
                    <div class="card-image-placeholder">
                        <img src="URL_AQUÍ" alt="Irina Hire Selection">
                    </div>
                    <h2>Irina Hire</h2>
                    <p>Especialista en selección técnica mediante IA y automatización de ranking de talento.</p>
                    <a href="#" class="card-btn">Lanzar Protocolo</a>
                </div>

                <!-- Las otras cartas seguirán el mismo formato con sus respectivos colores -->
            </div>

        </div>
    </div>

</body>
</html>
