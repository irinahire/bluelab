<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueLab | Blueprint Integrations Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Alkatra:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-irina: #bc8abf;
            --mint-irina: #96e8da;
            --bg-dark: #05070a;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center;
            min-height: 100vh; color: white;
            background-image: radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 2px);
            background-size: 100px 100px;
        }

        .report-frame {
            width: 95%; max-width: 1300px; margin: 40px 0; padding: 1px;
            border-radius: 30px; background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent);
            box-shadow: 0 50px 100px rgba(0,0,0,0.9); overflow: hidden;
        }

        .report-content {
            background: linear-gradient(rgba(10, 14, 23, 0.7), rgba(10, 14, 23, 0.7)), 
                        url('https://i.ibb.co/1tx0dKMJ/fondoweb.jpg');
            background-size: cover; background-position: center;
            border-radius: 29px; min-height: 100%; display: flex; flex-direction: column;
        }

        header {
            padding: 70px 40px; text-align: center;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand h1 {
            font-family: 'Alkatra', cursive; font-size: 5.5rem; margin: 0;
            background: linear-gradient(to right, #fff, var(--mint-irina));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .brand span {
            font-size: 1.1rem; letter-spacing: 8px; text-transform: uppercase;
            font-weight: 700; color: #85c1e9; display: block; margin-top: 10px;
        }

        .project-grid {
            padding: 60px; display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px;
        }

        /* --- TARJETAS CON DOBLE RAYO OPUESTO --- */
        .card {
            border-radius: 24px; padding: 2px;
            position: relative; overflow: hidden;
            transition: 0.3s ease; display: flex; flex-direction: column;
            aspect-ratio: 2 / 3.4;
        }

        /* Capas de luz (Antes era una sola, ahora son dos pseudo-elementos) */
        .card::before, .card::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 250%; height: 250%;
            background: conic-gradient(transparent, transparent, transparent, white);
            transform: translate(-50%, -50%);
            animation: rotate 4s linear infinite; display: none; z-index: 0;
        }

        /* El rayo opuesto rotado 180 grados */
        .card::after {
            animation-delay: -2s; /* Esto lo desfasa exactamente media vuelta */
        }

        .card:hover::before, .card:hover::after { display: block; }

        .card-inner {
            position: relative; z-index: 2; height: 100%; width: 100%;
            border-radius: 22px; padding: 30px;
            display: flex; flex-direction: column;
            box-sizing: border-box; align-items: center;
            text-align: center;
        }

        .card-img-container {
            width: 100%; aspect-ratio: 1 / 1; border-radius: 20px;
            margin-bottom: 25px; overflow: hidden;
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.15);
        }

        .card-img-container img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .card h2 {
            font-family: 'Alkatra', cursive; font-size: 1.9rem;
            margin: 0 0 12px 0; color: white; line-height: 1; width: 100%;
        }

        .card p {
            font-size: 0.95rem; line-height: 1.4; margin-bottom: 20px;
            flex-grow: 1; color: rgba(255,255,255,0.95); width: 100%;
        }

        .btn-row { display: flex; gap: 10px; height: 48px; width: 100%; }

        .card-btn {
            background: white; border-radius: 12px; text-decoration: none;
            font-size: 0.75rem; font-weight: 800; color: #111;
            display: flex; align-items: center; justify-content: center;
            flex-grow: 1; transition: 0.3s; text-transform: uppercase;
        }

        .btn-video {
            width: 48px; flex-grow: 0; background: rgba(255,255,255,0.2);
            color: white; font-size: 1.1rem; border: 1px solid rgba(255,255,255,0.2);
        }

        .card-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .c-irina .card-inner { background: linear-gradient(135deg, #bc8abf 0%, #96e8da 100%); }
        .c-donny .card-inner { background: linear-gradient(135deg, #96e8da 0%, #ffb347 100%); }
        .c-qore .card-inner { background: linear-gradient(135deg, #ffb347 0%, #4e52a7 100%); }
        .c-companion .card-inner { background: linear-gradient(135deg, #4e52a7 0%, #9b59b6 100%); }
        .c-pulse .card-inner { background: linear-gradient(135deg, #9b59b6 0%, #2ecc71 100%); }
        .c-next .card-inner { background: linear-gradient(135deg, #2ecc71 0%, #85c1e9 100%); }

    </style>
</head>
<body>
    <div class="report-frame">
        <div class="report-content">
            <header>
                <div class="brand">
                    <h1>BlueLab</h1>
                    <span>Blueprint Integrations Lab</span>
                </div>
            </header>

            <div class="project-grid">
                <!-- Tarjetas 1 a 5 (Se mantienen igual) -->
                <!-- ... -->

                <!-- 6. BLUE POS -->
                <div class="card c-next">
                    <div class="card-inner">
                        <div class="card-img-container">
                            <img src="https://www.ruralprimicias.com.ar/wp-content/uploads/2025/11/cyber_monday_no_border.png">
                        </div>
                        <h2>Blue POS</h2>
                        <p>Facturación cloud y gestión reactiva con precios sincronizados en tiempo real.</p>
                        <div class="btn-row">
                            <a href="#" class="card-btn">CONCEPT</a>
                            <a href="#" class="card-btn btn-video">▶</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
