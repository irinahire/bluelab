<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irina Hire Selection | Entrevista Virtual</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --irina-gradient: linear-gradient(135deg, #96e8da 0%, #bc8abf 100%);
            --bg-index: #05070a; 
            --text-dark: #111827;
            --text-gray: #4b5563;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-index);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .outer-frame {
            padding: 10px; 
            background: var(--irina-gradient);
            border-radius: 50px;
            width: 90%; max-width: 1080px;
            height: 85vh;
            display: flex;
            box-shadow: 0 0 80px rgba(150, 232, 218, 0.2);
        }

        .app-container {
            background: white;
            width: 100%; height: 100%;
            border-radius: 42px; 
            display: flex; overflow: hidden;
            position: relative;
        }

        .top-bar {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 80px;
            background: var(--irina-gradient);
            z-index: 10;
        }

        .info-side {
            flex: 1.1;
            padding: 110px 60px 60px 60px;
            display: flex; flex-direction: column;
            justify-content: center; z-index: 5;
        }

        .brand-title {
            font-size: 42px; font-weight: 800;
            background: var(--irina-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0 0 20px 0; letter-spacing: -1px;
        }

        .section-box h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px; color: var(--bg-index); font-weight: 800; }
        .section-box p { font-size: 13px; color: var(--text-gray); margin-bottom: 30px; line-height: 1.6; }

        .visual-side {
            flex: 1;
            background: url('https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg') center center / cover no-repeat;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            border-left: 1px solid #f3f4f6;
        }

        .dni-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px; border-radius: 28px;
            width: 300px; text-align: center;
            z-index: 15; border: 1px solid #e5e7eb;
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
        }

        input {
            width: 100%; padding: 18px;
            border: 2px solid #e5e7eb; border-radius: 14px;
            font-size: 20px; text-align: center;
            margin-bottom: 25px; outline: none;
            font-weight: 700; box-sizing: border-box;
        }

        #call-irina-btn {
            width: 100%; padding: 18px;
            background: #10b981; border: none;
            border-radius: 14px; color: white;
            font-weight: 800; cursor: pointer;
            transition: 0.2s;
        }

        /* AJUSTE PARA QUE NO SE MUEVA */
        #call-irina-btn:hover {
            background: #059669;
            transform: scale(1.02); /* Escala sutil, pero no se desplaza */
        }

        .support-tag {
            position: absolute; bottom: 40px; left: 60px;
            font-size: 11px; color: #9ca3af; text-decoration: none;
        }

        /* ESTILO PARA EL BOTÓN QUE INYECTA VAPI */
        .vapi-btn {
            border-radius: 14px !important; 
            background: var(--irina-gradient) !important;
            transform: none !important; /* Eliminamos cualquier movimiento forzado */
        }
    </style>
</head>
<body>
    <div class="outer-frame">
        <div class="app-container">
            <div class="top-bar"></div>
            <div class="info-side">
                <h1 class="brand-title">IRINA HIRE</h1>
                <div class="section-box">
                    <h3>Protocolo de Acceso</h3>
                    <p>Al presionar comenzar, usted acepta los Términos y la Política de Privacidad de Irina Hire Selection.</p>
                </div>
                <a href="mailto:soporte@bluelab.online" class="support-tag">SOPORTE TÉCNICO: soporte@bluelab.online</a>
            </div>
            <div class="visual-side">
                <div class="dni-card">
                    <div style="font-size: 11px; font-weight: 700; color: #9ca3af; margin-bottom: 15px;">DNI DEL POSTULANTE</div>
                    <input type="text" id="dni-input-center" placeholder="00.000.000">
                    <button id="call-irina-btn">VALIDAR Y COMENZAR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function(){
      var KEY = "403b3e01-61b7-4bc2-9c23-67a1f29c564d";
      var ASST = "183129be-11c6-479d-87d3-bc390c593600";
      var VAR_NAME = "customer_dni";

      function loadVapi(){
        if(window.vapiSDK) return Promise.resolve();
        return new Promise(function(res){
          var s=document.createElement("script");
          s.src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
          s.async=true; s.onload=res;
          document.head.appendChild(s);
        });
      }

      var btn = document.getElementById("call-irina-btn");
      var input = document.getElementById("dni-input-center");

      btn.onclick = function(){
        var v = (input.value || "").replace(/\D/g, "");
        if(v.length < 6) return alert("DNI no válido");
        
        btn.innerText = "CONECTANDO...";
        btn.style.background = "#bc8abf";

        loadVapi().then(function(){
          window.vapiSDK.run({ 
            apiKey: KEY, 
            assistant: ASST,
            assistantOverrides: { variableValues: { [VAR_NAME]: v } }
          });
          
          window.vapiSDK.on('call-start', () => {
              btn.innerText = "EN LLAMADA";
          });
        });
      };
    })();
    </script>
</body>
</html>
